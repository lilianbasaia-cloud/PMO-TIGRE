<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMO TIGRE — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #0f172a;
  --surface:  #1e293b;
  --surface2: #293548;
  --border:   #334155;
  --text:     #f1f5f9;
  --text2:    #94a3b8;
  --text3:    #64748b;

  --green:    #10b981;
  --blue:     #3b82f6;
  --yellow:   #f59e0b;
  --red:      #ef4444;
  --gray:     #475569;
  --purple:   #8b5cf6;
  --teal:     #14b8a6;
  --orange:   #f97316;
  --cyan:     #06b6d4;
  --indigo:   #6366f1;
  --pink:     #ec4899;

  --radius:   10px;
  --shadow:   0 4px 24px rgba(0,0,0,.4);
}
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}

/* ── Layout ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,.3);
}
.logo {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 18px; color: #fff; flex-shrink: 0;
}
header h1 { font-size: 18px; font-weight: 700; }
header h1 span { color: var(--text2); font-weight: 400; font-size: 13px; margin-left: 8px; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
#last-update { font-size: 12px; color: var(--text3); }
#refresh-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); padding: 6px 14px; border-radius: 6px;
  cursor: pointer; font-size: 12px; transition: all .2s;
}
#refresh-btn:hover { border-color: var(--blue); color: var(--blue); }

main { padding: 20px 24px; max-width: 1600px; margin: 0 auto; }

/* ── Stats ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  position: relative;
  overflow: hidden;
  transition: transform .15s;
}
.stat-card:hover { transform: translateY(-2px); }
.stat-card::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 100%; height: 3px;
  background: var(--accent);
}
.stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.stat-value { font-size: 28px; font-weight: 700; color: var(--accent); }
.stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* ── Filters ── */
.filters {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: flex-end;
}
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-group label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }
.filter-group select, .filter-group input {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 10px;
  border-radius: 6px;
  font-size: 13px;
  outline: none;
  min-width: 160px;
  transition: border-color .2s;
}
.filter-group select:focus, .filter-group input:focus { border-color: var(--blue); }
.filter-group select option { background: var(--surface2); }

.view-toggle { margin-left: auto; display: flex; gap: 4px; }
.view-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); padding: 7px 14px; border-radius: 6px;
  cursor: pointer; font-size: 13px; transition: all .2s;
}
.view-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
.view-btn:hover:not(.active) { border-color: var(--blue); color: var(--blue); }

/* ── Kanban ── */
.kanban {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
}
.kanban-col {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.kanban-col-header {
  padding: 12px 16px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border);
  font-weight: 600; font-size: 13px;
}
.col-dot { width: 10px; height: 10px; border-radius: 50%; }
.col-count {
  margin-left: auto;
  background: var(--surface2);
  border-radius: 20px;
  padding: 2px 10px;
  font-size: 12px; color: var(--text2);
}
.kanban-cards { padding: 12px; display: flex; flex-direction: column; gap: 8px; max-height: 70vh; overflow-y: auto; }

/* ── Cards ── */
.task-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  cursor: pointer;
  transition: all .15s;
  border-left: 3px solid var(--tema-color, var(--border));
}
.task-card:hover { border-color: var(--blue); transform: translateX(2px); box-shadow: var(--shadow); }
.card-top { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 8px; }
.card-title { font-size: 13px; font-weight: 600; flex: 1; line-height: 1.4; }
.badge {
  font-size: 10px; font-weight: 600; padding: 2px 7px;
  border-radius: 20px; white-space: nowrap; flex-shrink: 0;
}
.badge-generated { background: rgba(251,191,36,.15); color: #fbbf24; border: 1px solid rgba(251,191,36,.3); }
.badge-priority   { background: rgba(239,68,68,.15);  color: #ef4444;  border: 1px solid rgba(239,68,68,.3); }
.card-meta { display: flex; flex-wrap: wrap; gap: 6px; }
.meta-chip {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--text3);
}
.meta-chip svg { opacity: .6; }
.tema-badge {
  font-size: 10px; font-weight: 600; padding: 2px 8px;
  border-radius: 4px; color: #fff;
}
.rec-badge {
  font-size: 10px; padding: 2px 7px;
  border-radius: 20px; background: rgba(99,102,241,.15);
  color: var(--indigo); border: 1px solid rgba(99,102,241,.3);
}

/* ── Table ── */
#view-table { display: none; }
.tbl-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  background: var(--surface);
  padding: 10px 14px;
  text-align: left;
  font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
  color: var(--text3); white-space: nowrap;
  border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none;
}
thead th:hover { color: var(--text); }
thead th .sort-icon { opacity: .4; margin-left: 4px; }
thead th.sorted .sort-icon { opacity: 1; color: var(--blue); }
tbody tr { border-bottom: 1px solid rgba(51,65,85,.5); transition: background .1s; }
tbody tr:hover { background: var(--surface); }
tbody td { padding: 10px 14px; vertical-align: middle; }
tbody tr.generated-row td:first-child::before {
  content: '↻ '; color: var(--yellow); font-size: 10px;
}

/* ── Status pills ── */
.pill {
  display: inline-block; padding: 3px 10px;
  border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap;
}
.pill-green   { background: rgba(16,185,129,.15);  color: var(--green);  }
.pill-blue    { background: rgba(59,130,246,.15);   color: var(--blue);   }
.pill-yellow  { background: rgba(245,158,11,.15);   color: var(--yellow); }
.pill-red     { background: rgba(239,68,68,.15);    color: var(--red);    }
.pill-gray    { background: rgba(71,85,105,.25);    color: var(--text2);  }
.pill-tbd     { background: rgba(99,102,241,.15);   color: var(--indigo); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6); z-index: 200;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 28px; width: 90%; max-width: 560px;
  max-height: 80vh; overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,.6);
  animation: slideUp .2s ease;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } }
.modal-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 20px; }
.modal-header h2 { font-size: 16px; font-weight: 700; flex: 1; line-height: 1.4; }
.modal-close {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); width: 32px; height: 32px; border-radius: 6px;
  cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .15s;
}
.modal-close:hover { border-color: var(--red); color: var(--red); }
.modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 14px; }
.modal-field label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; display: block; }
.modal-field p { font-size: 13px; color: var(--text); }
.modal-comments {
  background: var(--surface2); border-radius: 8px;
  padding: 12px; font-size: 13px; color: var(--text2); line-height: 1.6; margin-top: 4px;
}

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text3);
}
.empty-state svg { opacity: .3; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

/* ── Loading ── */
#loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; transition: opacity .3s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 44px; height: 44px;
  border: 3px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Error ── */
#error-bar {
  background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3);
  color: var(--red); padding: 12px 24px; font-size: 13px; display: none;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Responsive ── */
@media (max-width: 640px) {
  header { padding: 12px 16px; }
  header h1 span { display: none; }
  main { padding: 14px 12px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .modal-row { grid-template-columns: 1fr; }
}

/* ── Splash (seleção de arquivo) ── */
#splash {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
}
#splash.hidden { display: none; }
.splash-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 36px;
  width: 90%; max-width: 460px;
  text-align: center;
  box-shadow: 0 24px 64px rgba(0,0,0,.5);
}
.splash-logo {
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 24px; color: #fff;
  margin: 0 auto 20px;
}
.splash-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.splash-card p  { color: var(--text2); font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
.splash-drop {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 28px 20px;
  margin-bottom: 16px;
  cursor: pointer;
  transition: all .2s;
  color: var(--text3);
  font-size: 13px;
}
.splash-drop:hover, .splash-drop.dragover {
  border-color: var(--blue);
  background: rgba(59,130,246,.06);
  color: var(--blue);
}
.splash-drop-icon { font-size: 32px; margin-bottom: 8px; }
.btn-primary {
  background: var(--blue); border: none; color: #fff;
  padding: 12px 28px; border-radius: 8px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  width: 100%; transition: background .2s;
  margin-bottom: 12px;
}
.btn-primary:hover { background: #2563eb; }
.splash-hint { font-size: 12px; color: var(--text3); }
.splash-hint a { color: var(--blue); cursor: pointer; text-decoration: underline; }

/* ── URL loader ── */
#url-panel {
  display: none;
  margin-top: 16px;
  text-align: left;
}
#url-panel.open { display: block; }
#url-panel label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; display: block; margin-bottom: 6px; }
.url-row { display: flex; gap: 8px; }
#url-input {
  flex: 1;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 8px 12px; border-radius: 6px;
  font-size: 13px; outline: none;
}
#url-input:focus { border-color: var(--blue); }
#url-load-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); padding: 8px 14px; border-radius: 6px;
  cursor: pointer; font-size: 13px; white-space: nowrap; transition: all .2s;
}
#url-load-btn:hover { border-color: var(--blue); color: var(--blue); }
</style>
</head>
<body>

<!-- Splash: seleção de arquivo -->
<div id="splash">
  <div class="splash-card" id="splash-drop-zone">
    <div class="splash-logo">P</div>
    <h2>PMO TIGRE</h2>
    <p>Selecione o arquivo <strong>PMO TIGRE - BKO.xlsx</strong><br>para carregar o dashboard</p>

    <div class="splash-drop" id="drop-area" onclick="document.getElementById('file-input').click()">
      <div class="splash-drop-icon">📂</div>
      Arraste o arquivo aqui ou clique para selecionar
    </div>

    <input type="file" id="file-input" accept=".xlsx,.xls" style="display:none">

    <button class="btn-primary" onclick="document.getElementById('file-input').click()">
      Abrir arquivo Excel
    </button>

    <div class="splash-hint">
      Ou <a onclick="toggleUrlPanel()">carregar de uma URL</a>
    </div>

    <div id="url-panel">
      <label>URL do arquivo Excel (GitHub raw, OneDrive, etc.)</label>
      <div class="url-row">
        <input type="text" id="url-input" placeholder="https://...">
        <button id="url-load-btn" onclick="loadFromUrl()">Carregar</button>
      </div>
    </div>
  </div>
</div>

<!-- Loading -->
<div id="loading" class="hidden"><div class="spinner"></div></div>

<!-- Error bar -->
<div id="error-bar"></div>

<!-- Header -->
<header>
  <div class="logo">P</div>
  <h1>PMO TIGRE <span>— BKO</span></h1>
  <div class="header-right">
    <span id="last-update"></span>
    <button id="refresh-btn" onclick="showSplash()">📂 Trocar arquivo</button>
  </div>
</header>

<main>
  <!-- Stats -->
  <div class="stats-grid" id="stats-grid"></div>

  <!-- Filters -->
  <div class="filters">
    <div class="filter-group">
      <label>Buscar</label>
      <input type="text" id="f-search" placeholder="Tarefa ou comentário…">
    </div>
    <div class="filter-group">
      <label>Responsável</label>
      <select id="f-resp"><option value="">Todos</option></select>
    </div>
    <div class="filter-group">
      <label>Tema</label>
      <select id="f-tema"><option value="">Todos</option></select>
    </div>
    <div class="filter-group">
      <label>Status</label>
      <select id="f-status"><option value="">Todos</option></select>
    </div>
    <div class="filter-group">
      <label>Recorrência</label>
      <select id="f-rec"><option value="">Todas</option></select>
    </div>
    <div class="filter-group">
      <label>Mês</label>
      <select id="f-mes"><option value="">Todos</option></select>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-kanban" onclick="setView('kanban')">⊞ Kanban</button>
      <button class="view-btn" id="btn-table"  onclick="setView('table')">☰ Tabela</button>
    </div>
  </div>

  <!-- Kanban -->
  <div id="view-kanban">
    <div class="kanban" id="kanban-board"></div>
  </div>

  <!-- Table -->
  <div id="view-table">
    <div class="tbl-wrap">
      <table id="task-table">
        <thead>
          <tr>
            <th onclick="sortTable('atividade')">Atividade <span class="sort-icon">↕</span></th>
            <th onclick="sortTable('tema')">Tema <span class="sort-icon">↕</span></th>
            <th onclick="sortTable('responsavel')">Responsável <span class="sort-icon">↕</span></th>
            <th onclick="sortTable('status')">Status <span class="sort-icon">↕</span></th>
            <th onclick="sortTable('status_geral')">Status Geral <span class="sort-icon">↕</span></th>
            <th onclick="sortTable('recorrencia')">Recorrência <span class="sort-icon">↕</span></th>
            <th onclick="sortTable('inicio')">Início <span class="sort-icon">↕</span></th>
            <th onclick="sortTable('termino')">Término <span class="sort-icon">↕</span></th>
            <th onclick="sortTable('dias')">Dias <span class="sort-icon">↕</span></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let ALL_TASKS = [];
let sortCol = 'inicio', sortAsc = true;
let currentView = 'kanban';

// ── Colors ───────────────────────────────────────────────────────────────────
const TEMA_COLORS = {
  'ADMINISTRATIVO': '#8b5cf6',
  'TREINAMENTO':    '#14b8a6',
  'OPERACIONAL':    '#f97316',
  'INFORMAÇÃO':     '#06b6d4',
  'PMO - GERAL':    '#6366f1',
  'PMO-GERAL':      '#6366f1',
  'DEFAULT':        '#3b82f6',
};
function temaColor(t) {
  const key = Object.keys(TEMA_COLORS).find(k => (t||'').toUpperCase().includes(k));
  return TEMA_COLORS[key] || TEMA_COLORS.DEFAULT;
}

const STATUS_KANBAN = [
  { key: 'NÃO INICIADO',  label: 'Não Iniciado',  color: '#475569' },
  { key: 'EM ANDAMENTO',  label: 'Em Andamento',  color: '#3b82f6' },
  { key: 'FINALIZADO',    label: 'Finalizado',    color: '#10b981' },
  { key: 'ATRASADO',      label: 'Atrasado',      color: '#ef4444' },
  { key: 'NÃO SE APLICA', label: 'Não se Aplica', color: '#334155' },
];

function statusPill(s) {
  const v = (s||'').toUpperCase();
  if (v.includes('CONCLUÍDO') && !v.includes('ATRASO')) return `<span class="pill pill-green">${s}</span>`;
  if (v.includes('ATRASO') || v === 'ATRASADO') return `<span class="pill pill-red">${s}</span>`;
  if (v === 'EM ANDAMENTO' || v === 'FINALIZADO') return `<span class="pill pill-blue">${s}</span>`;
  if (v === 'TBD' || v === 'NÃO INICIADO') return `<span class="pill pill-tbd">${s||'—'}</span>`;
  if (v === 'NÃO SE APLICA') return `<span class="pill pill-gray">${s}</span>`;
  return `<span class="pill pill-gray">${s||'—'}</span>`;
}

function fmtDate(d) {
  if (!d) return '—';
  const [y,m,dy] = d.split('-');
  return `${dy}/${m}/${y}`;
}

function diasColor(v) {
  if (v == null) return 'var(--text3)';
  if (v > 0)  return 'var(--green)';
  if (v < -5) return 'var(--red)';
  return 'var(--yellow)';
}

// ── Excel date helpers ────────────────────────────────────────────────────────
function parseExcelDate(val) {
  if (!val) return null;
  if (val instanceof Date) {
    if (isNaN(val)) return null;
    // Use UTC to avoid timezone shift
    const y = val.getUTCFullYear();
    const m = String(val.getUTCMonth() + 1).padStart(2, '0');
    const d = String(val.getUTCDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }
  if (typeof val === 'number' && val > 0) {
    // Excel serial date
    const d = new Date(Math.round((val - 25569) * 86400 * 1000));
    const y = d.getUTCFullYear();
    const mo = String(d.getUTCMonth() + 1).padStart(2, '0');
    const dy = String(d.getUTCDate()).padStart(2, '0');
    return `${y}-${mo}-${dy}`;
  }
  if (typeof val === 'string') {
    // Try ISO or dd/mm/yyyy formats
    const iso = val.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (iso) return `${iso[1]}-${iso[2]}-${iso[3]}`;
    const br = val.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
    if (br) return `${br[3]}-${br[2]}-${br[1]}`;
  }
  return null;
}

// ── addMonths (mirrors Python logic) ─────────────────────────────────────────
function addMonths(d, months) {
  const date = new Date(d + 'T00:00:00Z');
  const targetMonth = date.getUTCMonth() + months;
  const y = date.getUTCFullYear() + Math.floor(targetMonth / 12);
  const mo = ((targetMonth % 12) + 12) % 12;
  const maxDay = new Date(Date.UTC(y, mo + 1, 0)).getUTCDate();
  const day = Math.min(date.getUTCDate(), maxDay);
  const r = new Date(Date.UTC(y, mo, day));
  return r.toISOString().substring(0, 10);
}

// ── Parse Excel workbook ──────────────────────────────────────────────────────
function parseExcel(buffer) {
  const wb = XLSX.read(buffer, { type: 'array', cellDates: true });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: true, defval: null });

  const tasks = [];
  // Python: min_row=5, max_row=70 → 0-indexed: rows[4] to rows[69]
  for (let i = 4; i < Math.min(rows.length, 70); i++) {
    const row = rows[i] || [];
    const tema = row[1] != null ? String(row[1]).trim() : '';
    const ativ = row[2] != null ? String(row[2]).trim() : '';
    if (!tema && !ativ) continue;

    const diasVal = row[10];
    let dias = null;
    if (typeof diasVal === 'number' && !(diasVal instanceof Date)) {
      dias = diasVal;
    } else if (typeof diasVal === 'string' && !isNaN(parseFloat(diasVal))) {
      dias = parseFloat(diasVal);
    }

    tasks.push({
      id:           i + 1,
      tema,
      atividade:    ativ,
      mes_ref:      row[3]  != null ? String(row[3]).trim()  : '',
      responsavel:  row[4]  != null ? String(row[4]).trim()  : '',
      recorrencia:  row[5]  != null ? String(row[5]).trim()  : '',
      status:       row[6]  != null ? String(row[6]).trim()  : '',
      inicio:       parseExcelDate(row[7]),
      termino:      parseExcelDate(row[8]),
      conclusao:    parseExcelDate(row[9]),
      dias,
      status_geral: row[11] != null ? String(row[11]).trim() : '',
      prioridade:   row[12] != null ? String(row[12]).trim() : '',
      comentarios:  row[13] != null ? String(row[13]).trim() : '',
      gerada:       false,
    });
  }
  return tasks;
}

// ── Generate future recurring tasks ──────────────────────────────────────────
function generateFutureTasks(tasks) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const todayStr = today.toISOString().substring(0, 10);
  const future = [];

  for (const t of tasks) {
    const rec = (t.recorrencia || '').toUpperCase().trim();
    if (!['SEMANAL', 'MENSAL', 'SEMESTRAL'].includes(rec)) continue;
    if (!t.termino) continue;

    const terminoDate = new Date(t.termino + 'T00:00:00');
    const inicioDate  = t.inicio ? new Date(t.inicio + 'T00:00:00') : terminoDate;

    if (terminoDate >= today) continue; // still active

    const durDays = Math.max((terminoDate - inicioDate) / 86400000, 1);

    let niStr, ntStr;

    if (rec === 'SEMANAL') {
      const weeks = Math.max(1, Math.floor((today - inicioDate) / (7 * 86400000)) + 1);
      const ni = new Date(inicioDate.getTime() + weeks * 7 * 86400000);
      const nt = new Date(ni.getTime() + durDays * 86400000);
      niStr = ni.toISOString().substring(0, 10);
      ntStr = nt.toISOString().substring(0, 10);

    } else if (rec === 'MENSAL') {
      let months = (today.getFullYear() - inicioDate.getFullYear()) * 12
                 + (today.getMonth() - inicioDate.getMonth());
      months = Math.max(months, 1);
      niStr = addMonths(t.inicio, months);
      ntStr = addMonths(t.termino, months);

    } else if (rec === 'SEMESTRAL') {
      let months = Math.floor(
        ((today.getFullYear() - inicioDate.getFullYear()) * 12
        + (today.getMonth() - inicioDate.getMonth()) + 5) / 6
      ) * 6;
      months = Math.max(months, 6);
      niStr = addMonths(t.inicio, months);
      ntStr = addMonths(t.termino, months);
    }

    const newTask = { ...t };
    newTask.id           = `g${t.id}`;
    newTask.inicio       = niStr;
    newTask.termino      = ntStr;
    newTask.status       = 'NÃO INICIADO';
    newTask.status_geral = 'TBD';
    newTask.conclusao    = null;
    newTask.dias         = null;
    newTask.comentarios  = `[Gerado automaticamente — recorrência ${t.recorrencia}]`;
    newTask.gerada       = true;
    future.push(newTask);
  }
  return future;
}

// ── Process buffer (ArrayBuffer) → load dashboard ────────────────────────────
function processBuffer(buffer) {
  showLoading(true);
  try {
    const tasks   = parseExcel(new Uint8Array(buffer));
    const future  = generateFutureTasks(tasks);
    ALL_TASKS     = tasks.concat(future);

    document.getElementById('last-update').textContent =
      'Atualizado: ' + new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

    populateFilters();
    render();
    hideSplash();
  } catch (e) {
    showError('Erro ao ler o arquivo: ' + e.message);
    console.error(e);
  } finally {
    showLoading(false);
  }
}

// ── File picker ───────────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', function () {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => processBuffer(e.target.result);
  reader.readAsArrayBuffer(file);
});

// ── Drag & drop ───────────────────────────────────────────────────────────────
const dropArea = document.getElementById('drop-area');
dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('dragover'); });
dropArea.addEventListener('dragleave', () => dropArea.classList.remove('dragover'));
dropArea.addEventListener('drop', e => {
  e.preventDefault();
  dropArea.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => processBuffer(ev.target.result);
  reader.readAsArrayBuffer(file);
});

// ── Load from URL ─────────────────────────────────────────────────────────────
function toggleUrlPanel() {
  const panel = document.getElementById('url-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) document.getElementById('url-input').focus();
}

async function loadFromUrl() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;
  showLoading(true);
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const buffer = await resp.arrayBuffer();
    processBuffer(buffer);
  } catch (e) {
    showLoading(false);
    showError('Não foi possível carregar da URL: ' + e.message);
  }
}

// ── Splash helpers ────────────────────────────────────────────────────────────
function showSplash() {
  document.getElementById('splash').classList.remove('hidden');
}
function hideSplash() {
  document.getElementById('splash').classList.add('hidden');
}
function showLoading(on) {
  document.getElementById('loading').classList.toggle('hidden', !on);
}
function showError(msg) {
  const bar = document.getElementById('error-bar');
  bar.style.display = msg ? 'block' : 'none';
  bar.textContent = msg ? '⚠ ' + msg : '';
}

// ── Auto-load from ?src=URL param ─────────────────────────────────────────────
(async function autoLoad() {
  const src = new URLSearchParams(location.search).get('src');
  if (!src) return;
  document.getElementById('url-input').value = src;
  showLoading(true);
  try {
    const resp = await fetch(src);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const buffer = await resp.arrayBuffer();
    processBuffer(buffer);
  } catch (e) {
    showLoading(false);
    showError('Erro ao carregar automaticamente: ' + e.message);
  }
})();

// ── Filters ──────────────────────────────────────────────────────────────────
function populateFilters() {
  function fill(id, field) {
    const sel = document.getElementById(id);
    const cur = sel.value;
    const vals = [...new Set(ALL_TASKS.map(t => t[field]).filter(Boolean))].sort();
    sel.innerHTML = '<option value="">Todos</option>' +
      vals.map(v => `<option value="${v}"${v===cur?' selected':''}>${v}</option>`).join('');
  }
  fill('f-resp',   'responsavel');
  fill('f-tema',   'tema');
  fill('f-status', 'status');
  fill('f-rec',    'recorrencia');

  const meses = [...new Set(ALL_TASKS.map(t => {
    if (!t.termino) return null;
    const [y,m] = t.termino.split('-');
    return `${y}-${m}`;
  }).filter(Boolean))].sort();
  const selM = document.getElementById('f-mes');
  const curM = selM.value;
  selM.innerHTML = '<option value="">Todos</option>' +
    meses.map(v => {
      const [y,m] = v.split('-');
      const label = new Date(+y, +m-1).toLocaleDateString('pt-BR',{month:'short',year:'numeric'});
      return `<option value="${v}"${v===curM?' selected':''}>${label}</option>`;
    }).join('');
}

function getFiltered() {
  const search = document.getElementById('f-search').value.toLowerCase().trim();
  const resp   = document.getElementById('f-resp').value;
  const tema   = document.getElementById('f-tema').value;
  const status = document.getElementById('f-status').value;
  const rec    = document.getElementById('f-rec').value;
  const mes    = document.getElementById('f-mes').value;

  return ALL_TASKS.filter(t => {
    if (resp   && t.responsavel !== resp)   return false;
    if (tema   && t.tema !== tema)           return false;
    if (status && t.status !== status)       return false;
    if (rec    && t.recorrencia !== rec)     return false;
    if (mes) {
      const tm = t.termino ? t.termino.substring(0,7) : '';
      if (tm !== mes) return false;
    }
    if (search) {
      const hay = `${t.atividade} ${t.comentarios} ${t.responsavel}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

// ── Stats ────────────────────────────────────────────────────────────────────
function renderStats(tasks) {
  const total   = tasks.length;
  const done    = tasks.filter(t => ['FINALIZADO','NÃO SE APLICA'].includes(t.status)).length;
  const prog    = tasks.filter(t => t.status === 'EM ANDAMENTO').length;
  const pending = tasks.filter(t => t.status === 'NÃO INICIADO').length;
  const late    = tasks.filter(t => {
    if (!t.termino) return false;
    const today = new Date().toISOString().substring(0,10);
    return t.termino < today && !['FINALIZADO','NÃO SE APLICA'].includes(t.status);
  }).length;
  const gen     = tasks.filter(t => t.gerada).length;

  const pct = total ? Math.round(done / total * 100) : 0;

  const cards = [
    { label: 'Total',          value: total,   sub: '100%',          color: '#3b82f6' },
    { label: 'Finalizadas',    value: done,     sub: pct+'%',         color: '#10b981' },
    { label: 'Em Andamento',   value: prog,     sub: '',              color: '#06b6d4' },
    { label: 'Não Iniciadas',  value: pending,  sub: '',              color: '#6366f1' },
    { label: 'Atrasadas',      value: late,     sub: late?'⚠ atenção':'ok', color: late?'#ef4444':'#10b981' },
    { label: 'Auto-geradas',   value: gen,      sub: 'próx. recor.',  color: '#f59e0b' },
  ];

  document.getElementById('stats-grid').innerHTML = cards.map(c => `
    <div class="stat-card" style="--accent:${c.color}">
      <div class="stat-label">${c.label}</div>
      <div class="stat-value">${c.value}</div>
      ${c.sub ? `<div class="stat-sub">${c.sub}</div>` : ''}
    </div>
  `).join('');
}

// ── Kanban ────────────────────────────────────────────────────────────────────
function renderKanban(tasks) {
  const board = document.getElementById('kanban-board');

  const cols = STATUS_KANBAN.map(col => {
    const colTasks = tasks.filter(t => (t.status||'').toUpperCase() === col.key);
    return { ...col, tasks: colTasks };
  });

  const known = STATUS_KANBAN.map(c => c.key);
  const extra = [...new Set(tasks.map(t => (t.status||'').toUpperCase()).filter(s => s && !known.includes(s)))];
  extra.forEach(key => cols.push({ key, label: key, color: '#475569', tasks: tasks.filter(t => (t.status||'').toUpperCase() === key) }));

  board.innerHTML = cols.filter(c => c.tasks.length > 0).map(col => `
    <div class="kanban-col">
      <div class="kanban-col-header">
        <div class="col-dot" style="background:${col.color}"></div>
        <span>${col.label}</span>
        <span class="col-count">${col.tasks.length}</span>
      </div>
      <div class="kanban-cards">
        ${col.tasks.map(t => taskCard(t)).join('')}
        ${col.tasks.length === 0 ? '<div style="color:var(--text3);text-align:center;padding:20px;font-size:12px">Nenhuma tarefa</div>' : ''}
      </div>
    </div>
  `).join('');

  if (tasks.length === 0) {
    board.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <p>Nenhuma tarefa encontrada com os filtros selecionados.</p>
    </div>`;
  }
}

function taskCard(t) {
  const color = temaColor(t.tema);
  const today = new Date().toISOString().substring(0,10);
  const isLate = t.termino && t.termino < today && !['FINALIZADO','NÃO SE APLICA'].includes(t.status);

  return `
    <div class="task-card" style="--tema-color:${color}" onclick='openModal(${JSON.stringify(t).replace(/'/g,"&apos;")})'>
      <div class="card-top">
        <span class="card-title">${t.atividade || '—'}</span>
        ${t.gerada ? '<span class="badge badge-generated">↻ auto</span>' : ''}
        ${isLate   ? '<span class="badge badge-priority">⚑ atrasado</span>' : ''}
      </div>
      <div class="card-meta">
        <span class="tema-badge" style="background:${color}">${t.tema || '—'}</span>
        ${t.recorrencia ? `<span class="rec-badge">${t.recorrencia}</span>` : ''}
        <span class="meta-chip">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          ${t.responsavel || '—'}
        </span>
        ${t.termino ? `<span class="meta-chip">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${fmtDate(t.termino)}
        </span>` : ''}
        ${t.dias != null ? `<span class="meta-chip" style="color:${diasColor(t.dias)}">
          ${t.dias > 0 ? '+' : ''}${Math.round(t.dias)}d
        </span>` : ''}
      </div>
    </div>
  `;
}

// ── Table ────────────────────────────────────────────────────────────────────
function renderTable(tasks) {
  const sorted = [...tasks].sort((a, b) => {
    const va = a[sortCol] ?? '', vb = b[sortCol] ?? '';
    return sortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });

  const today = new Date().toISOString().substring(0,10);

  document.getElementById('table-body').innerHTML = sorted.map(t => {
    const isLate = t.termino && t.termino < today && !['FINALIZADO','NÃO SE APLICA'].includes(t.status);
    const color = temaColor(t.tema);
    return `
      <tr class="${t.gerada ? 'generated-row' : ''}" style="cursor:pointer" onclick='openModal(${JSON.stringify(t).replace(/'/g,"&apos;")})'>
        <td>
          <span style="font-weight:600">${t.atividade || '—'}</span>
          ${isLate ? ' <span style="color:var(--red);font-size:11px">⚑</span>' : ''}
        </td>
        <td><span class="tema-badge" style="background:${color}">${t.tema || '—'}</span></td>
        <td>${t.responsavel || '—'}</td>
        <td>${statusPill(t.status)}</td>
        <td>${statusPill(t.status_geral)}</td>
        <td>${t.recorrencia ? `<span class="rec-badge">${t.recorrencia}</span>` : '—'}</td>
        <td style="white-space:nowrap">${fmtDate(t.inicio)}</td>
        <td style="white-space:nowrap;color:${isLate?'var(--red)':'inherit'}">${fmtDate(t.termino)}</td>
        <td style="color:${diasColor(t.dias)};font-weight:600">
          ${t.dias != null ? (t.dias > 0 ? '+' : '') + Math.round(t.dias) : '—'}
        </td>
      </tr>
    `;
  }).join('');

  if (sorted.length === 0) {
    document.getElementById('table-body').innerHTML =
      '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text3)">Nenhuma tarefa encontrada.</td></tr>';
  }

  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
}

function sortTable(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  renderTable(getFiltered());
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const tasks = getFiltered();
  renderStats(tasks);
  if (currentView === 'kanban') renderKanban(tasks);
  else renderTable(tasks);
}

function setView(v) {
  currentView = v;
  document.getElementById('view-kanban').style.display = v === 'kanban' ? '' : 'none';
  document.getElementById('view-table').style.display  = v === 'table'  ? '' : 'none';
  document.getElementById('btn-kanban').classList.toggle('active', v === 'kanban');
  document.getElementById('btn-table').classList.toggle('active', v === 'table');
  render();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(t) {
  document.getElementById('modal-title').textContent = t.atividade || '—';
  const color = temaColor(t.tema);
  document.getElementById('modal-body').innerHTML = `
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
      <span class="tema-badge" style="background:${color}">${t.tema || '—'}</span>
      ${statusPill(t.status)}
      ${statusPill(t.status_geral)}
      ${t.recorrencia ? `<span class="rec-badge">${t.recorrencia}</span>` : ''}
      ${t.gerada ? '<span class="badge badge-generated">↻ Gerada automaticamente</span>' : ''}
      ${t.prioridade === '!' ? '<span class="badge badge-priority">! Alta prioridade</span>' : ''}
    </div>
    <div class="modal-row">
      <div class="modal-field"><label>Responsável</label><p>${t.responsavel || '—'}</p></div>
      <div class="modal-field"><label>Mês Referência</label><p>${t.mes_ref || '—'}</p></div>
      <div class="modal-field"><label>Início</label><p>${fmtDate(t.inicio)}</p></div>
      <div class="modal-field"><label>Término</label><p>${fmtDate(t.termino)}</p></div>
      <div class="modal-field"><label>Conclusão</label><p>${fmtDate(t.conclusao)}</p></div>
      <div class="modal-field">
        <label>Dias</label>
        <p style="color:${diasColor(t.dias)};font-weight:700">
          ${t.dias != null ? (t.dias > 0 ? '+' : '') + Math.round(t.dias) + ' dias' : '—'}
        </p>
      </div>
    </div>
    ${t.comentarios ? `
      <div class="modal-field">
        <label>Comentários / Observações</label>
        <div class="modal-comments">${t.comentarios}</div>
      </div>
    ` : ''}
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay') || e.currentTarget.classList.contains('modal-close')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(e); });

// ── Wire filters ──────────────────────────────────────────────────────────────
['f-search','f-resp','f-tema','f-status','f-rec','f-mes'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
  document.getElementById(id).addEventListener('change', render);
});
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMO TIGRE — Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f1f5f9;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;
  --text:#1e293b;--text2:#64748b;--text3:#94a3b8;
  --green:#10b981;--blue:#3b82f6;--yellow:#f59e0b;--red:#ef4444;
  --indigo:#6366f1;--teal:#14b8a6;--orange:#f97316;
  --radius:10px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.1);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.logo{width:34px;height:34px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;flex-shrink:0}
header h1{font-size:15px;font-weight:700}
header h1 span{color:var(--text3);font-weight:400;font-size:12px;margin-left:6px}
.header-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#2563eb}
.btn-outline{background:var(--surface);color:var(--text2);border-color:var(--border)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn-danger{background:#fee2e2;color:#b91c1c;border-color:#fecaca}
.btn-danger:hover{background:#fecaca}
.btn-sm{padding:5px 10px;font-size:11px}
.ts{font-size:11px;color:var(--text3);background:var(--surface2);padding:3px 9px;border-radius:20px;border:1px solid var(--border)}
/* MAIN */
main{padding:18px 24px;max-width:1600px;margin:0 auto}
/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;font-weight:600}
.stat-value{font-size:24px;font-weight:700;color:var(--accent);line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.stat-bar{height:4px;background:var(--border);border-radius:2px;margin-top:7px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .4s}
/* ALERTS */
.alerts-section{margin-bottom:14px}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:9px;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';width:3px;height:13px;background:var(--red);border-radius:2px}
.alerts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:10px}
.alert-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.alert-card-header{padding:9px 13px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border);font-weight:600;font-size:12px;cursor:pointer;user-select:none}
.alert-card-header:hover{background:var(--surface2)}
.alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.alert-count{margin-left:auto;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.ac-red{background:rgba(239,68,68,.1);color:var(--red)}
.ac-yellow{background:rgba(245,158,11,.1);color:var(--yellow)}
.ac-blue{background:rgba(59,130,246,.1);color:var(--blue)}
.alert-chevron{font-size:9px;color:var(--text3);transition:transform .2s}
.alert-card.collapsed .alert-chevron{transform:rotate(-90deg)}
.alert-body{max-height:200px;overflow-y:auto}
.alert-body.hidden{display:none}
.alert-item{padding:7px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .1s;font-size:12px}
.alert-item:hover{background:var(--surface2)}
.alert-item:last-child{border-bottom:none}
.alert-item-name{flex:1;font-weight:500;line-height:1.3}
.alert-item-meta{text-align:right;flex-shrink:0}
.alert-item-date{display:block;font-size:10px;font-weight:700}
.dred{color:var(--red)}.dyellow{color:var(--yellow)}.dblue{color:var(--blue)}
.alert-item-resp{display:block;font-size:10px;color:var(--text3)}
.alert-empty{padding:14px;text-align:center;color:var(--text3);font-size:12px}
/* FILTERS */
.filters{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 15px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:9px;align-items:flex-end;box-shadow:var(--shadow)}
.filter-group{display:flex;flex-direction:column;gap:3px}
.filter-group label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.filter-group select,.filter-group input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 9px;border-radius:6px;font-size:12px;outline:none;min-width:130px}
.filter-group select:focus,.filter-group input:focus{border-color:var(--blue)}
.view-toggle{margin-left:auto;display:flex;gap:4px}
.view-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500}
.view-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:13px}
.kanban-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.kanban-col-header{padding:9px 13px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border);font-weight:600;font-size:12px;background:var(--surface2)}
.col-dot{width:8px;height:8px;border-radius:50%}
.col-count{margin-left:auto;background:var(--border);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--text2);font-weight:600}
.kanban-cards{padding:9px;display:flex;flex-direction:column;gap:7px;max-height:65vh;overflow-y:auto}
.task-card{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--tc,var(--border));border-radius:8px;padding:10px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.task-card:hover{border-color:var(--blue);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.task-card.is-late{background:#fff5f5;border-color:#fecaca;border-left-color:var(--red)!important}
.task-card.is-warn{background:#fffbeb;border-color:#fde68a}
.card-top{display:flex;align-items:flex-start;gap:5px;margin-bottom:6px}
.card-title{font-size:12px;font-weight:600;flex:1;line-height:1.4}
.badge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.badge-auto{background:rgba(245,158,11,.12);color:#b45309;border:1px solid rgba(245,158,11,.3)}
.badge-late{background:rgba(239,68,68,.12);color:#b91c1c;border:1px solid rgba(239,68,68,.3)}
.badge-warn{background:rgba(245,158,11,.12);color:#92400e;border:1px solid rgba(245,158,11,.3)}
.card-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.tb{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;color:#fff}
.rb{font-size:10px;padding:2px 6px;border-radius:20px;background:rgba(99,102,241,.1);color:var(--indigo);border:1px solid rgba(99,102,241,.2)}
.mc{font-size:11px;color:var(--text3)}
/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--surface2);padding:8px 12px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);white-space:nowrap;border-bottom:1px solid var(--border);cursor:pointer;font-weight:700}
thead th:hover{color:var(--blue)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer}
tbody tr:hover{background:var(--surface2)}
tbody tr.row-late{background:#fff5f5}
tbody tr.row-late:hover{background:#fee2e2}
tbody tr.row-warn{background:#fffbeb}
tbody tr.row-warn:hover{background:#fef3c7}
tbody td{padding:8px 12px;vertical-align:middle}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.pg{background:rgba(16,185,129,.1);color:#047857}
.pb{background:rgba(59,130,246,.1);color:#1d4ed8}
.pt{background:rgba(100,116,139,.1);color:#475569}
.pr{background:rgba(239,68,68,.1);color:#b91c1c}
.py{background:rgba(100,116,139,.08);color:var(--text3)}
/* VIEW MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:15px;font-weight:700;flex:1;line-height:1.4}
.modal-close{background:var(--surface2);border:1px solid var(--border);color:var(--text3);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-close:hover{background:var(--border);color:var(--text)}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
.mf label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;display:block;font-weight:700}
.mf p{font-size:13px;font-weight:500}
.mc2{background:var(--surface2);border-radius:8px;padding:10px;font-size:12px;color:var(--text2);line-height:1.7;margin-top:4px;border:1px solid var(--border)}
.modal-footer{display:flex;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
/* EDIT MODAL */
.edit-modal{max-width:580px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg.full{grid-column:1/-1}
.fg label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.fg input,.fg select,.fg textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:7px;font-size:13px;outline:none;font-family:inherit;width:100%;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue);background:#fff}
.fg textarea{resize:vertical;min-height:70px;line-height:1.5}
.fg input[type=date]{color-scheme:light}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:500;background:var(--text);color:#fff;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:500;box-shadow:var(--shadow-md);opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:#047857}
.toast.err{background:#b91c1c}
/* DIVIDER */
.data-source{font-size:11px;color:var(--text3);margin-top:3px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--surface2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
</style>
</head>
<body>
<header>
  <div class="logo">P</div>
  <h1>PMO TIGRE <span>&#8212; BKO</span></h1>
  <div class="header-actions">
    <span class="ts" id="hts">&#8212;</span>
    <button class="btn btn-outline btn-sm" onclick="reloadFromGitHub()">&#8635; Atualizar</button>
    <button class="btn btn-outline btn-sm" onclick="triggerImport()">&#8593; Importar Excel</button>
    <button class="btn btn-outline btn-sm" onclick="exportExcel()">&#8595; Exportar Excel</button>
    <button class="btn btn-primary btn-sm" onclick="openNew()">+ Nova Tarefa</button>
  </div>
</header>
<main>
  <div class="stats-grid" id="sg"></div>
  <div class="alerts-section">
    <div class="section-title">Pontos de Aten&#231;&#227;o</div>
    <div class="alerts-grid" id="alerts-grid"></div>
  </div>
  <div class="filters">
    <div class="filter-group"><label>Buscar</label><input type="text" id="fs" placeholder="Tarefa, respons&#225;vel..."></div>
    <div class="filter-group"><label>Respons&#225;vel</label><select id="fr"><option value="">Todos</option></select></div>
    <div class="filter-group"><label>Tema</label><select id="ft"><option value="">Todos</option></select></div>
    <div class="filter-group"><label>Status</label><select id="fst"><option value="">Todos</option></select></div>
    <div class="filter-group"><label>Recorr&#234;ncia</label><select id="frc"><option value="">Todas</option></select></div>
    <div class="filter-group"><label>M&#234;s</label><select id="fm"><option value="">Todos</option></select></div>
    <div class="view-toggle">
      <button class="view-btn active" id="bk" onclick="sv('kanban')">Kanban</button>
      <button class="view-btn" id="bt" onclick="sv('table')">Tabela</button>
    </div>
  </div>
  <div id="vk"><div class="kanban" id="kb"></div></div>
  <div id="vt" style="display:none">
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th onclick="st('atividade')">Atividade</th>
        <th onclick="st('tema')">Tema</th>
        <th onclick="st('responsavel')">Respons&#225;vel</th>
        <th onclick="st('status')">Status</th>
        <th onclick="st('status_geral')">Status Geral</th>
        <th onclick="st('recorrencia')">Recorr&#234;ncia</th>
        <th onclick="st('inicio')">In&#237;cio</th>
        <th onclick="st('termino')">T&#233;rmino</th>
        <th onclick="st('dias')">Dias</th>
      </tr></thead>
      <tbody id="tb2"></tbody>
    </table></div>
  </div>
</main>

<!-- VIEW MODAL -->
<div class="modal-overlay" id="mo" onclick="cmv(event)">
  <div class="modal">
    <div class="modal-header"><h2 id="mt"></h2><button class="modal-close" onclick="cmv()">&#x2715;</button></div>
    <div id="mb"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="openEditFromView()">&#9998; Editar</button>
      <button class="btn btn-outline" onclick="cmv()">Fechar</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="emo" onclick="cme(event)">
  <div class="modal edit-modal">
    <div class="modal-header">
      <h2 id="edit-title">Editar Tarefa</h2>
      <button class="modal-close" onclick="cme()">&#x2715;</button>
    </div>
    <div class="form-grid" id="edit-form">
      <div class="fg full"><label>Atividade *</label><input id="fe-atividade" placeholder="Nome da atividade"></div>
      <div class="fg"><label>Tema</label>
        <select id="fe-tema">
          <option value="">-- Selecione --</option>
          <option>ADMINISTRATIVO</option>
          <option>INFORMA&#199;&#195;O</option>
          <option>OPERACIONAL</option>
          <option>TREINAMENTO</option>
        </select>
      </div>
      <div class="fg"><label>Respons&#225;vel</label><input id="fe-responsavel" list="resp-list" placeholder="Nome"><datalist id="resp-list"></datalist></div>
      <div class="fg"><label>Status</label>
        <select id="fe-status">
          <option value="">-- Selecione --</option>
          <option>N&#195;O INICIADO</option>
          <option>EM ANDAMENTO</option>
          <option>FINALIZADO</option>
          <option>N&#195;O SE APLICA</option>
        </select>
      </div>
      <div class="fg"><label>Status Geral</label>
        <select id="fe-status_geral">
          <option value="">-- Selecione --</option>
          <option>TBD</option>
          <option>CONCLU&#205;DO</option>
          <option>EM ANDAMENTO</option>
          <option>ATRASADO</option>
          <option>N&#195;O SE APLICA</option>
        </select>
      </div>
      <div class="fg"><label>Recorr&#234;ncia</label>
        <select id="fe-recorrencia">
          <option value="">-- Selecione --</option>
          <option>SEMANAL</option>
          <option>MENSAL</option>
          <option>PONTUAL</option>
          <option>EVENTUAL</option>
        </select>
      </div>
      <div class="fg"><label>M&#234;s Ref.</label>
        <select id="fe-mes_ref">
          <option value="">-- Selecione --</option>
          <option>JANEIRO</option><option>FEVEREIRO</option><option>MAR&#199;O</option>
          <option>ABRIL</option><option>MAIO</option><option>JUNHO</option>
          <option>JULHO</option><option>AGOSTO</option><option>SETEMBRO</option>
          <option>OUTUBRO</option><option>NOVEMBRO</option><option>DEZEMBRO</option>
        </select>
      </div>
      <div class="fg"><label>In&#237;cio</label><input type="date" id="fe-inicio"></div>
      <div class="fg"><label>T&#233;rmino</label><input type="date" id="fe-termino"></div>
      <div class="fg"><label>Conclus&#227;o</label><input type="date" id="fe-conclusao"></div>
      <div class="fg full"><label>Coment&#225;rios</label><textarea id="fe-comentarios" placeholder="Observa&#231;&#245;es..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveTask()">&#10003; Salvar</button>
      <button class="btn btn-outline" onclick="cme()">Cancelar</button>
      <button class="btn btn-danger" id="btn-delete" style="margin-left:auto;display:none" onclick="deleteTask()">&#128465; Excluir</button>
    </div>
  </div>
</div>

<!-- Import file input -->
<input type="file" id="import-input" accept=".xlsx,.xls" style="display:none" onchange="importExcel(this)">

<!-- Toast -->
<div class="toast" id="toast"></div>

    +'<div class="mf"><label>M\u00eas Ref.</label><p>'+(t.mes_ref||'-')+'</p></div>'
    +'<div class="mf"><label>In\u00edcio</label><p>'+fd(t.inicio)+'</p></div>'
    +'<div class="mf"><label>T\u00e9rmino</label><p style="color:'+(late?'var(--red)':warn?'var(--yellow)':'inherit')+';font-weight:'+(late||warn?700:500)+'">'+fd(t.termino)+'</p></div>'
    +'<div class="mf"><label>Conclus\u00e3o</label><p>'+fd(t.conclusao)+'</p></div>'
    +'<div class="mf"><label>Dias</label><p style="color:'+dc(t.dias)+';font-weight:700">'+(t.dias!=null?(t.dias>0?'+':'')+Math.round(t.dias)+' dias':'-')+'</p></div>'
    +'</div>'
    +(t.comentarios?'<div class="mf"><label>Coment\u00e1rios</label><div class="mc2">'+t.comentarios+'</div></div>':'');
  document.getElementById('mo').classList.add('open');
}
function openEditFromView(){cmv();openEdit(_viewTask);}
function cmv(e){if(!e||e.target===document.getElementById('mo'))document.getElementById('mo').classList.remove('open');}

// ── EDIT MODAL ───────────────────────────────────────────────────────────────
function openNew(){
  _editId=null;
  document.getElementById('edit-title').textContent='Nova Tarefa';
  document.getElementById('btn-delete').style.display='none';
  clearForm();
  document.getElementById('emo').classList.add('open');
}
function openEdit(t){
  if(!t)return;
  _editId=t.id;
  document.getElementById('edit-title').textContent='Editar Tarefa';
  document.getElementById('btn-delete').style.display='';
  fillForm(t);
  document.getElementById('emo').classList.add('open');
}
function cme(e){if(!e||e.target===document.getElementById('emo'))document.getElementById('emo').classList.remove('open');}
function clearForm(){
  ['fe-atividade','fe-responsavel','fe-comentarios'].forEach(function(id){document.getElementById(id).value='';});
  ['fe-tema','fe-status','fe-status_geral','fe-recorrencia','fe-mes_ref'].forEach(function(id){document.getElementById(id).value='';});
  ['fe-inicio','fe-termino','fe-conclusao'].forEach(function(id){document.getElementById(id).value='';});
}
function fillForm(t){
  document.getElementById('fe-atividade').value=t.atividade||'';
  document.getElementById('fe-tema').value=t.tema||'';
  document.getElementById('fe-responsavel').value=t.responsavel||'';
  document.getElementById('fe-status').value=t.status||'';
  document.getElementById('fe-status_geral').value=t.status_geral||'';
  document.getElementById('fe-recorrencia').value=t.recorrencia||'';
  document.getElementById('fe-mes_ref').value=t.mes_ref||'';
  document.getElementById('fe-inicio').value=t.inicio||'';
  document.getElementById('fe-termino').value=t.termino||'';
  document.getElementById('fe-conclusao').value=t.conclusao||'';
  document.getElementById('fe-comentarios').value=t.comentarios||'';
}
function readForm(){
  var inicio=document.getElementById('fe-inicio').value||null;
  var termino=document.getElementById('fe-termino').value||null;
  var conclusao=document.getElementById('fe-conclusao').value||null;
  return {
    atividade:document.getElementById('fe-atividade').value.trim(),
    tema:document.getElementById('fe-tema').value,
    responsavel:document.getElementById('fe-responsavel').value.trim(),
    status:document.getElementById('fe-status').value,
    status_geral:document.getElementById('fe-status_geral').value,
    recorrencia:document.getElementById('fe-recorrencia').value,
    mes_ref:document.getElementById('fe-mes_ref').value,
    inicio:inicio, termino:termino, conclusao:conclusao,
    dias:calcDias(inicio,termino,conclusao),
    comentarios:document.getElementById('fe-comentarios').value.trim(),
    prioridade:'', gerada:false
  };
}
function saveTask(){
  var t=readForm();
  if(!t.atividade){toast('Atividade \u00e9 obrigat\u00f3ria','err');return;}
  if(_editId===null){
    t.id=nextId();
    D.push(t);
    toast('Tarefa criada!','ok');
  } else {
    var idx=D.findIndex(function(x){return x.id===_editId;});
    if(idx>=0){t.id=_editId;D[idx]=t;toast('Tarefa salva!','ok');}
  }
  saveData();cme();pf();render();
}
function deleteTask(){
  if(!confirm('Excluir esta tarefa? Esta a\u00e7\u00e3o n\u00e3o pode ser desfeita.'))return;
  var idx=D.findIndex(function(x){return x.id===_editId;});
  if(idx>=0)D.splice(idx,1);
  saveData();cme();pf();render();toast('Tarefa exclu\u00edda');
}

// ── EXCEL IMPORT ─────────────────────────────────────────────────────────────
function triggerImport(){document.getElementById('import-input').click();}
function parseDate(v){
  if(!v)return null;
  if(typeof v==='number'){var d=new Date(Math.round((v-25569)*86400000));return d.toISOString().substring(0,10);}
  var s=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  var p=s.split(/[\/\-\.]/);
  if(p.length===3){
    if(p[2].length===4)return p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
    if(p[0].length===4)return p[0]+'-'+p[1].padStart(2,'0')+'-'+p[2].padStart(2,'0');
  }
  return null;
}
function col(row,names){for(var i=0;i<names.length;i++){var k=names[i];if(row[k]!==undefined&&row[k]!==null&&row[k]!=='')return row[k];}return null;}
function importExcel(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var wb=XLSX.read(ev.target.result,{type:'binary'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{defval:null});
      if(!rows.length){toast('Planilha vazia','err');return;}
      D=rows.map(function(r,i){
        var inicio=parseDate(col(r,['Início','Inicio','inicio','INICIO','DATA INICIO']));
        var termino=parseDate(col(r,['Término','Termino','termino','TERMINO','DATA TERMINO','FIM']));
        var conclusao=parseDate(col(r,['Conclusão','Conclusao','conclusao','CONCLUSAO']));
        var dias=col(r,['Dias','dias','DIAS']);
        if(dias===null)dias=calcDias(inicio,termino,conclusao);
        return{
          id: col(r,['ID','id','Id'])||(i+1),
          tema: col(r,['Tema','tema','TEMA'])||'',
          atividade: col(r,['Atividade','atividade','ATIVIDADE','Tarefa','TAREFA'])||'',
          mes_ref: col(r,['Mês Ref.','Mes Ref','mes_ref','MES_REF','MÊS','Mês','mes'])||'',
          responsavel: col(r,['Responsável','Responsavel','responsavel','RESPONSAVEL'])||'',
          recorrencia: col(r,['Recorrência','Recorrencia','recorrencia','RECORRENCIA'])||'',
          status: col(r,['Status','status','STATUS'])||'',
          inicio:inicio, termino:termino, conclusao:conclusao,
          dias:typeof dias==='number'?dias:null,
          status_geral: col(r,['Status Geral','status_geral','STATUS_GERAL','Status geral'])||'',
          prioridade: col(r,['Prioridade','prioridade','PRIORIDADE'])||'',
          comentarios: col(r,['Comentários','Comentarios','comentarios','COMENTARIOS','Obs','Observações'])||'',
          gerada:false
        };
      });
      saveData();pf();render();
      toast('Importado! '+D.length+' tarefas carregadas.','ok');
    }catch(e){toast('Erro ao importar: '+e.message,'err');}
    input.value='';
  };
  reader.readAsBinaryString(file);
}

// ── LOAD FROM URL ────────────────────────────────────────────────────────────
function reloadFromGitHub() {
  if(!confirm('Isso vai substituir os dados locais pelos dados mais recentes do GitHub. Continuar?')) return;
  localStorage.removeItem(STORAGE_KEY);
  loadFromURL(AUTO_URL, false);
}
function loadFromURL(url, silent) {
  if(!silent) toast('Carregando...','ok');
  fetch(url)
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.arrayBuffer(); })
    .then(function(buf){
      var wb=XLSX.read(new Uint8Array(buf),{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{defval:null});
      if(!rows.length){if(!silent)toast('Planilha vazia','err');return;}
      D=rows.map(function(r,i){
        var inicio=parseDate(col(r,['Início','Inicio','inicio','INICIO','DATA INICIO']));
        var termino=parseDate(col(r,['Término','Termino','termino','TERMINO','DATA TERMINO','FIM']));
        var conclusao=parseDate(col(r,['Conclusão','Conclusao','conclusao','CONCLUSAO']));
        var dias=col(r,['Dias','dias','DIAS']);
        if(dias===null)dias=calcDias(inicio,termino,conclusao);
        return{
          id:col(r,['ID','id','Id'])||(i+1),
          tema:col(r,['Tema','tema','TEMA'])||'',
          atividade:col(r,['Atividade','atividade','ATIVIDADE','Tarefa','TAREFA'])||'',
          mes_ref:col(r,['Mês Ref.','Mes Ref','mes_ref','MES_REF','MÊS','Mês','mes'])||'',
          responsavel:col(r,['Responsável','Responsavel','responsavel','RESPONSAVEL'])||'',
          recorrencia:col(r,['Recorrência','Recorrencia','recorrencia','RECORRENCIA'])||'',
          status:col(r,['Status','status','STATUS'])||'',
          inicio:inicio,termino:termino,conclusao:conclusao,
          dias:typeof dias==='number'?dias:null,
          status_geral:col(r,['Status Geral','status_geral','STATUS_GERAL','Status geral'])||'',
          prioridade:col(r,['Prioridade','prioridade','PRIORIDADE'])||'',
          comentarios:col(r,['Comentários','Comentarios','comentarios','COMENTARIOS','Obs','Observações'])||'',
          gerada:false
        };
      });
      saveData();pf();render();
      document.getElementById('hts').textContent='GitHub \u2713';
      if(!silent)toast('Carregado! '+D.length+' tarefas.','ok');
    })
    .catch(function(e){if(!silent)toast('Erro ao carregar: '+e.message,'err');});
}

// ── EXCEL EXPORT ─────────────────────────────────────────────────────────────
function exportExcel(){
  if(typeof XLSX==='undefined'){toast('SheetJS n\u00e3o carregado (verifique conex\u00e3o)','err');return;}
  var headers=['ID','Tema','Atividade','M\u00eas Ref.','Respons\u00e1vel','Recorr\u00eancia','Status','In\u00edcio','T\u00e9rmino','Conclus\u00e3o','Dias','Status Geral','Prioridade','Coment\u00e1rios'];
  var rows=[headers].concat(D.map(function(t){
    return[t.id,t.tema,t.atividade,t.mes_ref,t.responsavel,t.recorrencia,t.status,t.inicio,t.termino,t.conclusao,t.dias,t.status_geral,t.prioridade,t.comentarios];
  }));
  var wb=XLSX.utils.book_new();
  var ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:6},{wch:16},{wch:32},{wch:12},{wch:16},{wch:14},{wch:16},{wch:12},{wch:12},{wch:12},{wch:6},{wch:16},{wch:10},{wch:40}];
  XLSX.utils.book_append_sheet(wb,'PMO TIGRE',ws);
  XLSX.writeFile(wb,'PMO-TIGRE-BKO.xlsx');
  toast('Excel baixado!','ok');
}

document.addEventListener('keydown',function(e){if(e.key==='Escape'){cmv(e);cme(e);}});
['fs','fr','ft','fst','frc','fm'].forEach(function(id){
  document.getElementById(id).addEventListener('input',render);

});
var AUTO_URL='https://raw.githubusercontent.com/lilianbasaia-cloud/PMO-TIGRE/main/PMO%20TIGRE%20-%20BKO.xlsx';
loadData();
pf();
render();
var stored=localStorage.getItem(STORAGE_KEY);
if(stored){
  document.getElementById('hts').textContent='Dados locais';
}else{
  document.getElementById('hts').textContent='Carregando...';
  loadFromURL(AUTO_URL,true);
}
